<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Commerce Truth Layer</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(170deg, #FEF6F4 0%, #F7F7F9 100%);
      color: #2D2D42;
      text-align: center;
      padding: 2rem;
    }
    .error-page { max-width: 480px; }
    .error-page__code {
      font-size: 7rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, #E8553A, #BF3F2A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .error-page__title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .error-page__text {
      font-size: 1rem;
      color: #6B6B82;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .error-page__link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #E8553A, #D44A32);
      color: #fff;
      font-weight: 600;
      font-size: 0.875rem;
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(232, 85, 58, 0.25);
    }
    .error-page__link:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(232, 85, 58, 0.35);
    }
  </style>
</head>
<body>
  <main class="error-page">
    <p class="error-page__code">404</p>
    <h1 class="error-page__title">Page not found</h1>
    <p class="error-page__text">
      The page you're looking for doesn't exist or has been moved.
      Let's get you back to the Commerce Truth Layer demo.
    </p>
    <a href="./" class="error-page__link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
  </main>
</body>
</html>
